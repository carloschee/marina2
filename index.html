<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no, maximum-scale=1" />
  <title>Marina</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#062a35" />

  <!-- iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Marina" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-180.png" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Lexend:wght@400;500;600;700&display=swap" />

  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #062a35;
      font-family: 'Lexend', system-ui, sans-serif;
      overflow: hidden;
      -webkit-user-select: none; user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      touch-action: manipulation;
    }
    #root {
      width: 100vw; height: 100vh;
      padding-top:    env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left:   env(safe-area-inset-left);
      padding-right:  env(safe-area-inset-right);
      box-sizing: border-box;
    }
    /* Stage 1180×820 — scale-to-fit cualquier iPad */
    .marina-stage {
      position: relative;
      width: 1180px; height: 820px;
      transform-origin: top left;
    }
    /* Boot splash */
    .marina-boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #062a35; color: #f7f1e3;
      gap: 24px; z-index: 9999;
      transition: opacity .4s;
    }
    .marina-boot.ready { opacity: 0; pointer-events: none; }
    .marina-boot img   { width: 128px; height: 128px; border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .marina-boot .name { font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 36px; letter-spacing: -1px; }
    .marina-boot .dot  { display: inline-block; width: 8px; height: 8px; border-radius: 99px; background: #38d9a9; margin: 0 3px; animation: dot 1.2s infinite ease-in-out; }
    .marina-boot .dot:nth-child(2) { animation-delay: 0.15s; }
    .marina-boot .dot:nth-child(3) { animation-delay: 0.30s; }
    @keyframes dot { 0%,80%,100% { opacity:.2; transform:scale(.8); } 40% { opacity:1; transform:scale(1); } }
    /* Banner de actualización SW */
    #marina-update-banner {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      z-index: 2147483647;
      background: #0e3a48; color: #f7f1e3;
      font-family: 'Lexend', system-ui, sans-serif; font-size: 14px; font-weight: 500;
      padding: 12px 20px; border-radius: 99px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      display: flex; align-items: center; gap: 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    #marina-update-ok {
      appearance: none; border: none; cursor: pointer;
      background: #38d9a9; color: #0a1f27;
      font-family: inherit; font-weight: 700; font-size: 13px;
      padding: 6px 16px; border-radius: 99px;
    }
    #marina-update-dismiss {
      appearance: none; border: none; cursor: pointer;
      background: transparent; color: rgba(247,241,227,0.5);
      font-size: 18px; padding: 0 4px;
    }
  </style>
</head>
<body>

<div id="root"></div>

<div class="marina-boot" id="marina-boot">
  <img src="icons/icon-256.png" alt="Marina" />
  <div class="name">Marina</div>
  <div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
</div>

<!-- Scale-to-fit -->
<script>
(function () {
  var W = 1180, H = 820;
  function fit() {
    var stage = document.querySelector('.marina-stage');
    if (!stage) { requestAnimationFrame(fit); return; }
    var vw = window.innerWidth, vh = window.innerHeight;
    var s  = Math.min(vw / W, vh / H);
    var ox = Math.round((vw - W * s) / 2);
    var oy = Math.round((vh - H * s) / 2);
    stage.style.transform = 'translate(' + ox + 'px,' + oy + 'px) scale(' + s + ')';
  }
  new MutationObserver(fit).observe(document.getElementById('root'), { childList: true, subtree: true });
  window.addEventListener('resize', fit);
  window.addEventListener('orientationchange', fit);
  requestAnimationFrame(fit);
  // Ocultar splash cuando React monta
  new MutationObserver(function (_, obs) {
    if (document.getElementById('root').children.length > 0) {
      var b = document.getElementById('marina-boot');
      if (b) { b.classList.add('ready'); setTimeout(function () { b.remove(); }, 500); }
      obs.disconnect();
    }
  }).observe(document.getElementById('root'), { childList: true });
})();
</script>

<!-- React (UMD, sin Babel) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
        crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
        crossorigin="anonymous"></script>

<!-- App base — orden importa -->
<script src="shared.js"></script>   <!-- useTTS, helpers        -->
<script src="shell.js"></script>    <!-- T, MarinaShell, TopBar -->
<script src="home.js"></script>     <!-- HomeScreen, EmptyState -->
<!-- Módulos — agregar aquí un <script> por módulo:
     <script src="modules/mi-modulo.js"></script>
-->
<script src="app.js"></script>      <!-- MarinaApp + boot       -->

<!-- Service Worker + banner de actualización -->
<script>
(function () {
  if (!('serviceWorker' in navigator)) return;
  window.addEventListener('load', async function () {
    var reg;
    try { reg = await navigator.serviceWorker.register('./sw.js'); }
    catch (e) { console.warn('[sw] register failed', e); return; }

    function onUpdateFound() {
      var nw = reg.installing; if (!nw) return;
      nw.addEventListener('statechange', function () {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) showBanner(reg);
      });
    }
    reg.addEventListener('updatefound', onUpdateFound);
    if (reg.waiting && navigator.serviceWorker.controller) showBanner(reg);

    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (refreshing) return; refreshing = true; window.location.reload();
    });
  });

  function showBanner(reg) {
    if (document.getElementById('marina-update-banner')) return;
    var b = document.createElement('div');
    b.id = 'marina-update-banner'; b.setAttribute('role', 'status');
    b.innerHTML = '<span>Nueva versión disponible</span>'
      + '<button id="marina-update-ok">Actualizar</button>'
      + '<button id="marina-update-dismiss" aria-label="cerrar">×</button>';
    document.body.appendChild(b);
    document.getElementById('marina-update-ok').onclick = function () {
      b.remove(); reg.waiting && reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    };
    document.getElementById('marina-update-dismiss').onclick = function () { b.remove(); };
  }
})();

// Gesto PIN — 3 toques esquina superior izquierda
var _tc = 0, _tt;
document.addEventListener('pointerdown', function (e) {
  if (e.clientX < 80 && e.clientY < 80) {
    _tc++; clearTimeout(_tt);
    _tt = setTimeout(function () { _tc = 0; }, 1500);
    if (_tc >= 3) {
      _tc = 0;
      var btn = document.querySelector('[aria-label="área de adultos"]');
      for (var i = 0; i < 5; i++) btn && btn.click();
    }
  }
});
</script>

</body>
</html>
