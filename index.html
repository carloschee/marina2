<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Marina 2">
  <meta name="theme-color" content="#03111a">
  <title>Marina 2</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/img/icon-192.png">
  <link rel="icon" type="image/png" href="assets/img/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap">

  <style>
    /* ── Variables Marina — azul profundo ──────────────────────────────────── */
    :root {
      --m-bg:          #03111a;
      --m-bg-mid:      #041e2e;
      --m-surface:     #062a3e;
      --m-ink:         #e8f4f8;
      --m-ink-soft:    rgba(200,230,240,0.55);
      --m-ink-dark:    #07212e;
      --m-primary:     #0ea5c9;
      --m-primary-dk:  #0369a1;
      --m-accent:      #38bdf8;
      --m-teal:        #14b8a6;
      --m-coral:       #fb7185;
      --m-gold:        #fbbf24;
      --m-nav-bg:      linear-gradient(135deg, #03111a 0%, #041e2e 50%, #03111a 100%);
      --d-nav-h:       56px;
      --d-primary:     #0ea5c9;
      --r-sm: 10px; --r-md: 16px; --r-lg: 22px; --r-xl: 30px;
      --s-card: 0 4px 20px rgba(14,165,201,0.12);
      --s-deep: 0 8px 32px rgba(3,105,161,0.28);
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--m-bg);
      color: var(--m-ink);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: var(--m-bg);
    }

    /* ── Corrientes submarinas ────────────────────────────────────────────────
       Reemplaza aurora. Luz azul profundo moviéndose como agua.
       Sin neón, sin rojo/verde. Solo azules fríos + teal.
       Movimiento lento y sinuoso — entre 14 y 26 segundos por ciclo.     */

    #app-aurora {                  /* id conservado para no tocar el HTML */
      position: fixed; inset: 0;
      z-index: 0; overflow: hidden;
      pointer-events: none;
    }

    /* Corriente principal — masa de luz que baja desde la superficie */
    #app-aurora::before {
      content: '';
      position: absolute;
      border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%;
      filter: blur(55px);
      opacity: 0.48;
      width: 90vw; height: 70vw;
      top: -25vw; left: -15vw;
      background: radial-gradient(ellipse at 45% 35%,
        #0ea5c9 0%, #0369a1 38%, #041e2e 65%, transparent 80%);
      animation: corriente-a 20s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* Corriente secundaria — teal que sube desde el fondo */
    #app-aurora::after {
      content: '';
      position: absolute;
      border-radius: 55% 45% 40% 60% / 45% 55% 50% 50%;
      filter: blur(62px);
      opacity: 0.36;
      width: 80vw; height: 60vw;
      bottom: -20vw; right: -10vw;
      background: radial-gradient(ellipse at 55% 60%,
        #14b8a6 0%, #0369a1 42%, transparent 72%);
      animation: corriente-b 26s ease-in-out infinite alternate;
      will-change: transform;
    }

    /* Filamentos — corrientes más finas */
    .aurora-blob {                 /* clase conservada para no tocar el HTML */
      position: absolute;
      pointer-events: none;
      will-change: transform;
      border-radius: 40% 60% 65% 35% / 55% 40% 60% 45%;
    }

    /* Filamento 1 — bioluminiscencia izquierda */
    .aurora-blob:nth-child(1) {
      width: 62vw; height: 28vw;
      top: 28%; left: -4%;
      filter: blur(46px); opacity: 0.26;
      background: radial-gradient(ellipse at 40% 50%,
        #38bdf8 0%, #0ea5c9 45%, transparent 70%);
      animation: corriente-c 15s ease-in-out infinite alternate;
    }

    /* Filamento 2 — corriente profunda centro-derecha */
    .aurora-blob:nth-child(2) {
      width: 52vw; height: 24vw;
      top: 54%; right: -2%;
      filter: blur(52px); opacity: 0.22;
      background: radial-gradient(ellipse at 60% 50%,
        #14b8a6 0%, #0369a1 50%, transparent 72%);
      animation: corriente-d 22s ease-in-out infinite alternate;
    }

    /* Filamento 3 — destello de superficie, muy sutil */
    .aurora-blob:nth-child(3) {
      width: 38vw; height: 18vw;
      top: 6%; right: 8%;
      filter: blur(40px); opacity: 0.16;
      background: radial-gradient(ellipse at 50% 40%,
        #7dd3fc 0%, #0ea5c9 55%, transparent 75%);
      animation: corriente-e 12s ease-in-out infinite alternate;
    }

    /* ── Keyframes — sinuosos, sin saltos, con skew para simular refracción */
    @keyframes corriente-a {
      0%   { transform: translate(0,0) skewX(0deg) scale(1);
             border-radius: 40% 60% 55% 45% / 50% 45% 55% 50%; }
      30%  { transform: translate(6vw,5vh) skewX(1.4deg) scale(1.07);
             border-radius: 50% 50% 45% 55% / 46% 54% 50% 50%; }
      65%  { transform: translate(11vw,10vh) skewX(-0.9deg) scale(1.12);
             border-radius: 46% 54% 60% 40% / 55% 45% 46% 54%; }
      100% { transform: translate(17vw,14vh) skewX(-0.4deg) scale(1.17);
             border-radius: 42% 58% 52% 48% / 48% 52% 55% 45%; }
    }

    @keyframes corriente-b {
      0%   { transform: translate(0,0) skewX(0deg) scale(1.05);
             border-radius: 55% 45% 40% 60% / 45% 55% 50% 50%; }
      35%  { transform: translate(-6vw,-5vh) skewX(1.4deg) scale(0.98);
             border-radius: 60% 40% 46% 54% / 50% 50% 55% 45%; }
      100% { transform: translate(-14vw,-12vh) skewX(-0.7deg) scale(0.90);
             border-radius: 50% 50% 40% 60% / 42% 58% 48% 52%; }
    }

    @keyframes corriente-c {
      0%   { transform: translate(0,0) skewY(0deg) scale(1); }
      45%  { transform: translate(5vw,-4vh) skewY(1.1deg) scale(1.06); }
      100% { transform: translate(10vw,-8vh) skewY(-0.7deg) scale(1.11); }
    }

    @keyframes corriente-d {
      0%   { transform: translate(0,0) skewY(0deg) scale(1); }
      38%  { transform: translate(-3vw,4vh) skewY(-1.4deg) scale(1.06); }
      100% { transform: translate(-8vw,9vh) skewY(0.9deg) scale(0.95); }
    }

    @keyframes corriente-e {
      0%   { transform: translate(0,0) scale(1); opacity:.16; }
      50%  { transform: translate(-5vw,4vh) scale(1.09); opacity:.22; }
      100% { transform: translate(4vw,7vh) scale(0.93); opacity:.12; }
    }

    /* ── Header ─────────────────────────────────────────────────────────────── */
    #app-header {
      flex-shrink: 0;
      height: calc(var(--d-nav-h) + var(--safe-top));
      padding-top: var(--safe-top);
      display: flex;
      align-items: center;
      padding: 20px 12px 0;
      gap: 8px;
      background: var(--m-nav-bg);
      border-radius: 0 0 20px 20px;
      box-shadow: 0 4px 20px rgba(3,105,161,0.32);
      position: relative;
      z-index: 20;
    }

    #header-izq { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .menu-logo { display: flex; align-items: baseline; gap: 6px; }
    .menu-logo h1 {
      font-size: 1.45rem; font-weight: 900; letter-spacing: -0.5px; color: #fff;
    }
    .menu-logo .version {
      font-size: 0.6rem; font-weight: 700;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: .1em;
    }

    #btn-volver {
      display: none; align-items: center; justify-content: center;
      width: 40px; height: 40px; flex-shrink: 0;
      border: none; background: transparent; padding: 0; cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #btn-volver:active  { transform: scale(0.88); filter: brightness(0.8); }
    #btn-volver.visible { display: flex; }
    #btn-volver img {
      width: 100%; height: 100%; object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
    }

    /* ── Indicador offline ───────────────────────────────────────────────────── */
    #indicador-offline {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700;
      border: 1.5px solid; transition: all 0.3s ease;
    }
    #indicador-offline.online   { background: rgba(20,184,166,0.15);  border-color: #14b8a6; color: #5eead4; }
    #indicador-offline.offline  { background: rgba(251,113,133,0.15); border-color: #fb7185; color: #fda4af; }
    #indicador-offline.checking { background: rgba(251,191,36,0.15);  border-color: #fbbf24; color: #fcd34d; }

    #dot-conexion { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .online  #dot-conexion  { background: #14b8a6; }
    .offline #dot-conexion  { background: #fb7185; }
    .checking #dot-conexion { background: #fbbf24; }

    #modulo-acciones { display: flex; align-items: center; gap: 6px; flex: 1; justify-content: flex-end; }
    #header-derecha  { display: flex; align-items: center; flex-shrink: 0; margin-left: 8px; }

    /* ── Body / menu ─────────────────────────────────────────────────────────── */
    #app-body { flex: 1; min-height: 0; position: relative; z-index: 1; }

    #vista-menu {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      overflow: hidden; background: transparent;
    }

    #menu-grid {
      flex: 1; overflow: hidden;
      padding: 12px 20px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 8px;
      position: relative; z-index: 1; background: transparent;
    }

    @media (max-width: 600px) {
      #menu-grid { grid-template-columns: repeat(2,1fr); grid-template-rows: repeat(3,1fr); }
      .tile-label { font-size: 0.82rem; }
    }

    .module-tile {
      background: transparent; border: none; box-shadow: none;
      padding: 8px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 10px;
      cursor: pointer; position: relative;
      transition: transform 0.15s ease; min-height: 0;
    }
    .module-tile:active { transform: scale(0.90); }

    .tile-img   { width: 72%; height: auto; object-fit: contain; transition: filter 0.15s ease; }
    .tile-label { font-size: 1rem; font-weight: 900; text-align: center; color: white;
                  text-shadow: 0 2px 10px rgba(0,0,0,0.68); line-height: 1.2; flex-shrink: 0; }

    /* ── Botones nav ─────────────────────────────────────────────────────────── */
    .d-nav-btn {
      display: flex; align-items: center; justify-content: center;
      height: 32px; padding: 0 13px; border-radius: var(--r-md); border: none;
      background: rgba(255,255,255,0.12); color: white;
      font-size: 0.8rem; font-weight: 800; cursor: pointer; gap: 5px;
      white-space: nowrap; transition: background 0.15s, transform 0.12s;
    }
    .d-nav-btn:active { background: rgba(255,255,255,0.24); transform: scale(0.93); }
    .d-nav-btn.activo { background: rgba(14,165,201,0.28); border: 1px solid rgba(56,189,248,0.30); }

    .d-lang-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: var(--r-sm);
      border: 2px solid rgba(255,255,255,0.20);
      background: rgba(255,255,255,0.08); color: white; font-size: 1rem;
      cursor: pointer; transition: all 0.15s;
    }
    .d-lang-btn.activo { border-color: #38bdf8; background: rgba(14,165,201,0.22); }

    /* ── Modal PIN ───────────────────────────────────────────────────────────── */
    #modal-pin {
      position: fixed; inset: 0;
      background: rgba(3,17,26,0.72);
      display: none; align-items: center; justify-content: center;
      z-index: 9000; backdrop-filter: blur(10px);
    }
    #modal-pin.visible { display: flex; }

    .pin-box {
      background: var(--m-surface);
      border-radius: var(--r-xl); padding: 32px;
      width: 88%; max-width: 340px; text-align: center;
      box-shadow: var(--s-deep);
      border: 1.5px solid rgba(14,165,201,0.25);
    }
    .pin-box h3 { font-size: 1.3rem; font-weight: 900; margin-bottom: 8px;  color: var(--m-ink); }
    .pin-box p  { font-size: 1rem;   font-weight: 800; margin-bottom: 16px; color: var(--m-ink-soft); }

    #input-pin {
      width: 100%; padding: 16px; text-align: center;
      font-size: 2.6rem; font-weight: 900;
      border: 2px solid rgba(14,165,201,0.25); border-radius: var(--r-md);
      outline: none; margin-bottom: 14px;
      background: rgba(3,111,161,0.10); color: var(--m-ink);
      font-family: inherit;
    }
    #input-pin:focus { border-color: var(--m-primary); box-shadow: 0 0 0 3px rgba(14,165,201,0.18); }

    .pin-btns { display: flex; gap: 10px; }
    .pin-btns button {
      flex: 1; padding: 15px; border-radius: var(--r-md); border: none;
      font-weight: 900; font-size: 1.1rem; cursor: pointer; font-family: inherit;
    }
    #btn-pin-ok     { background: var(--m-primary); color: white; }
    #btn-pin-cancel { background: rgba(255,255,255,0.08); color: var(--m-ink); }

    #pin-error { color: var(--m-coral); font-size: 0.95rem; font-weight: 800; margin-top: 8px; min-height: 1em; }
  </style>
</head>

<body>

  <script>
    window.addEventListener('error', e => {
      document.body.innerHTML +=
        '<pre style="background:red;color:white;padding:10px;font-size:12px;position:fixed;top:0;left:0;right:0;z-index:99999;overflow:auto;">ERROR: ' + e.message + '\n' + e.filename + '\nLinea: ' + e.lineno + '</pre>';
    });
    window.addEventListener('unhandledrejection', e => {
      document.body.innerHTML +=
        '<pre style="background:orange;color:black;padding:10px;font-size:12px;position:fixed;top:0;left:0;right:0;z-index:99999;overflow:auto;">PROMISE: ' + e.reason + '</pre>';
    });
  </script>

  <div id="app">

    <div id="app-aurora">
      <div class="aurora-blob"></div>
      <div class="aurora-blob"></div>
      <div class="aurora-blob"></div>
    </div>

    <header id="app-header">
      <div id="header-izq">
        <button id="btn-volver" aria-label="Volver al menu">
          <img src="assets/ui/btn-inicio.png" alt="Inicio">
        </button>
        <div class="menu-logo" id="header-logo">
          <h1>Dótir 2</h1>
        </div>
        <div id="perfil-chip" style="
          display:flex;align-items:center;gap:6px;
          padding:4px 10px 4px 6px;
          border-radius:20px;
          background:rgba(255,255,255,0.08);
          border:1px solid rgba(255,255,255,0.12);
          cursor:default;
          max-width:140px;
        ">
          <span id="perfil-chip-avatar" style="font-size:1.1rem;line-height:1;flex-shrink:0;"></span>
          <span id="perfil-chip-apodo" style="
            color:rgba(255,255,255,0.75);font-size:0.68rem;font-weight:800;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
          "></span>
        </div>
      </div>
      <div id="modulo-acciones"></div>
      <div id="header-derecha">
        <div id="indicador-offline" class="checking">
          <span id="dot-conexion"></span>
          <span id="texto-conexion">Verificando...</span>
        </div>
      </div>
    </header>

    <div id="app-body">
      <div id="vista-menu">
        <nav id="menu-grid" aria-label="Modulos de la aplicacion"></nav>
      </div>
    </div>

  </div>

  <div id="modal-pin" role="dialog" aria-modal="true">
    <div class="pin-box">
      <h3>Acceso Protegido</h3>
      <p id="pin-hint"></p>
      <input type="number" id="input-pin" placeholder="..." inputmode="numeric" autocomplete="off">
      <div class="pin-btns">
        <button id="btn-pin-cancel">Cancelar</button>
        <button id="btn-pin-ok">Entrar</button>
      </div>
      <p id="pin-error" role="alert"></p>
    </div>
  </div>

  <script type="module">
    import { registrarSW, onConexionChange } from './core/offline.js';
    import { toast, animarEntrada } from './core/ui.js';
    import AudioManager, { MediaStop } from './core/audio.js';
    import { Perfiles } from './core/perfiles.js';

    const $ = id => document.getElementById(id);

    registrarSW();

    onConexionChange(estado => {
      $('indicador-offline').className = estado;
      $('texto-conexion').textContent = {
        online: 'En linea', offline: 'Sin conexion', checking: 'Verificando...'
      }[estado];
    });

    const MODULE_REGISTRY = [
      AjustesModule,
    ].filter(m => m.habilitado && m.id !== 'ajustes')
     .sort((a, b) => a.orden - b.orden);

    const UI_IMGS = {
      ajustes:      'assets/ui/btn-ajustes.png',
    };

    // -- Render del menu grid filtrado por perfil activo ---
    function _renderMenuGrid() {
      const grid       = $('menu-grid');
      const habilitados = Perfiles.getModulosHabilitados();
      grid.innerHTML   = '';

      MODULE_REGISTRY.forEach(mod => {
        // Si hay lista explícita, filtrar; ajustes siempre visible
        if (habilitados && !habilitados.includes(mod.id)) return;

        const tile = document.createElement('button');
        tile.className = 'module-tile';
        tile.setAttribute('aria-label', mod.label);
        tile.dataset.id = mod.id;

        const imgSrc = UI_IMGS[mod.id];
        tile.innerHTML =
          (imgSrc
            ? '<img class="tile-img" src="' + imgSrc + '" alt="' + mod.label + '">'
            : '<span style="font-size:4rem">' + mod.emoji + '</span>') +
          '<span class="tile-label">' + mod.label + '</span>';

        tile.addEventListener('click', () =>
          mod.requierePin ? abrirPin(mod) : navegarA(mod)
        );
        grid.appendChild(tile);
      });
    }

    // Renderizar al inicio y suscribir a cambios de perfil
    _renderMenuGrid();
    Perfiles.onChange(_renderMenuGrid);

    let _moduloActivo = null;
    const _modulosPausados = {};
    const _contenedores = {};

    function _getContenedor(id) {
      if (!_contenedores[id]) {
        const div = document.createElement('div');
        div.dataset.modulo = id;
        div.style.cssText =
          'position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;';
        $('app-body').appendChild(div);
        _contenedores[id] = div;
      }
      return _contenedores[id];
    }

    function _modoMenu() {
      $('btn-volver').classList.remove('visible');
      $('header-logo').style.display = '';
      $('modulo-acciones').innerHTML = '';
    }

    function _modoModulo() {
      $('btn-volver').classList.add('visible');
      $('header-logo').style.display = 'none';
    }

    async function navegarA(mod) {
      $('vista-menu').style.display = 'none';
      _modoModulo();

      if (_moduloActivo && _moduloActivo.id !== mod.id) {
        try { _moduloActivo.onLeave?.(); } catch (_) {}
        if (_moduloActivo.pause) {
          try { _moduloActivo.pause(); } catch (_) {}
          _getContenedor(_moduloActivo.id).style.display = 'none';
          _modulosPausados[_moduloActivo.id] = _moduloActivo;
        } else {
          try { _moduloActivo.destroy?.(); } catch (_) {}
          const c = _contenedores[_moduloActivo.id];
          if (c) { c.innerHTML = ''; c.style.display = 'none'; }
        }
        _moduloActivo = null;
      }

      const contenedor = _getContenedor(mod.id);

      if (_modulosPausados[mod.id] && mod.resume) {
        _moduloActivo = mod;
        contenedor.style.display = 'flex';
        $('modulo-acciones').innerHTML = '';
        try {
          await mod.resume(contenedor);
          mod.onEnter?.();
          animarEntrada(contenedor);
        } catch (e) {
          console.error('[App] Error al resumir ' + mod.id, e);
        }
        return;
      }

      if (_modulosPausados[mod.id] && !mod.resume) {
        try { _modulosPausados[mod.id].destroy?.(); } catch (_) {}
        delete _modulosPausados[mod.id];
        contenedor.innerHTML = '';
      }

      _moduloActivo = mod;
      contenedor.innerHTML = '';
      contenedor.style.display = 'flex';
      $('modulo-acciones').innerHTML = '';

      try {
        await mod.init(contenedor);
        mod.onEnter?.();
        animarEntrada(contenedor);
      } catch (e) {
        console.error('[App] Error en modulo ' + mod.id, e);
        contenedor.innerHTML =
          '<div style="padding:2rem;color:#ef4444;font-weight:600;">Error al cargar el modulo.</div>';
      }
    }

    function volverAlMenu() {
      if (_moduloActivo) {
        try { _moduloActivo.onLeave?.(); } catch (_) {}
        const contenedor = _getContenedor(_moduloActivo.id);
        if (_moduloActivo.pause) {
          try { _moduloActivo.pause(); } catch (_) {}
          contenedor.style.display = 'none';
          _modulosPausados[_moduloActivo.id] = _moduloActivo;
        } else {
          try { _moduloActivo.destroy?.(); } catch (_) {}
          contenedor.innerHTML = '';
          contenedor.style.display = 'none';
        }
        _moduloActivo = null;
      }
      $('vista-menu').style.display = '';
      _modoMenu();
    }

    $('btn-volver').addEventListener('click', volverAlMenu);

    let _pinTarget = null, _pinRespuesta = 0;

    function abrirPin(mod) {
      _pinTarget = mod;
      const a = Math.floor(Math.random() * 9) + 1;
      const b = Math.floor(Math.random() * 9) + 1;
      _pinRespuesta = a + b;
      $('pin-hint').textContent = 'Resuelve: ' + a + ' + ' + b + ' = ?';
      $('input-pin').value = '';
      $('pin-error').textContent = '';
      $('modal-pin').classList.add('visible');
      setTimeout(() => $('input-pin').focus(), 100);
    }

    function cerrarPin() {
      $('modal-pin').classList.remove('visible');
      _pinTarget = null;
    }

    $('btn-pin-ok').addEventListener('click', () => {
      if (parseInt($('input-pin').value, 10) === _pinRespuesta) {
        const mod = _pinTarget;
        cerrarPin();
        navegarA(mod);
      } else {
        $('pin-error').textContent = 'Respuesta incorrecta, intenta de nuevo.';
        $('input-pin').value = '';
        $('input-pin').focus();
      }
    });
    $('btn-pin-cancel').addEventListener('click', cerrarPin);
    $('input-pin').addEventListener('keydown', e => {
      if (e.key === 'Enter') $('btn-pin-ok').click();
    });
    $('modal-pin').addEventListener('click', e => {
      if (e.target === $('modal-pin')) cerrarPin();
    });

    const moduloUrl = new URLSearchParams(location.search).get('modulo');
    if (moduloUrl) {
      const mod = MODULE_REGISTRY.find(m => m.id === moduloUrl);
      if (mod) navegarA(mod);
    }

    window.DotirApp = { volverAlMenu, navegarA, toast, MODULE_REGISTRY };

    // -- Chip de perfil activo ---
    function _actualizarChipPerfil() {
      const p      = Perfiles.getActivo();
      const avatar = $('perfil-chip-avatar');
      const apodo  = $('perfil-chip-apodo');
      const chip   = $('perfil-chip');
      if (!avatar || !apodo || !chip) return;
      if (p.avatarFoto) {
        avatar.innerHTML =
          '<img src="' + p.avatarFoto + '" style="width:22px;height:22px;' +
          'border-radius:50%;object-fit:cover;">';
      } else {
        avatar.textContent = p.avatar || '🧑';
      }
      apodo.textContent    = p.esInvitado ? 'Invitado' : p.apodo;
      chip.style.opacity   = p.esInvitado ? '0.45' : '1';
    }

    _actualizarChipPerfil();
    Perfiles.onChange(_actualizarChipPerfil);

    // -- Botón de ajustes en header ---
    const btnAjustes = document.createElement('button');
    btnAjustes.id = 'btn-ajustes-header';
    btnAjustes.title = 'Ajustes';
    btnAjustes.style.cssText =
      'margin-right:15px;width:32px;height:32px;border:none;background:transparent;' +
      'cursor:pointer;display:flex;align-items:center;justify-content:center;' +
      'color:rgba(255,255,255,0.55);font-size:1.1rem;flex-shrink:0;transition:color .15s;';
    btnAjustes.innerHTML = '&#9881;&#65039;';
    btnAjustes.addEventListener('click', () => abrirPin(AjustesModule));
    $('header-derecha')?.insertBefore(btnAjustes, $('indicador-offline'));

    MediaStop.montar();

    // -- Wake Lock ---
    const _wakeVideo = document.createElement('video');
    _wakeVideo.loop        = true;
    _wakeVideo.muted       = true;
    _wakeVideo.playsInline = true;
    _wakeVideo.setAttribute('playsinline', '');
    _wakeVideo.setAttribute('webkit-playsinline', '');
    _wakeVideo.style.cssText =
      'position:fixed;width:1px;height:1px;top:0;left:0;opacity:0.01;pointer-events:none;z-index:-1;';
    _wakeVideo.src = 'data:video/mp4;base64,' +
      'AAAAHGZ0eXBpc29tAAACAGlzb21pc28yYXZjMQAAAAhmcmVlAAAAG21kYXQAAAGzABAHAAABthAd' +
      'AT8LkAAA9oAAAIUGl2aXNhAAAHAm1vb3YAAABsbXZoZAAAAAAAAAAAAAAAAAAAA+gAAAPoAAEAAAEB' +
      'AAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAA' +
      'AAABAAAABnN0dHMAAAAAAAAAAQAAAAEAAAAUAAAAFHN0c3MAAAAAAAAAAQAAAAEAAAAcc3RzYwAAAAAA' +
      'AAABAAAABAAAAAEAAAABAAAAHHN0c3oAAAAAAAACMgAAAAEAAAAUAAAAFHN0Y28AAAAAAAAAAQAAADAA' +
      'AAABdHJhawAAAFx0a2hkAAAAAwAAAAAAAAAAAAAAAAAAAAAAAAABAAAAAAAAAAAAAAAAAAAAAAAA' +
      'AQAAAAAAAAAAAAAAAQAAAAAAAAAAAAAAAAAAQAAAAAFAAAACAAAAAAAAAAB4bWRpYQAAACBtZGhk' +
      'AAAAAAAAAAAAAAAAAAB9AAAB9AAVxAAAAAAAI2hkbHIAAAAAAAAAAHZpZGUAAAAAAAAAAAAAAABW' +
      'aWRlb0hhbmRsZXIAAAABD21pbmYAAAAUdm1oZAAAAAEAAAAAAAAAAAAAACRkaW5mAAAAHGRyZWYA' +
      'AAAAAAAAAQAAAAx1cmwgAAAAAQAAAM9zdGJsAAAAa3N0c2QAAAAAAAAAAQAAAFthdmMxAAAAAAAA' +
      'AAABABAAAAAAAAAAAAAB9AAB9AABAAABAAHgQAEABl//gdLCmgAAAAAAAAAAAAAAAAAAAAAAAAAAAA' +
      'AAAAAAAAAAAAAAAAAAP//AAAB9AAAB9AQAAAAAEAAAABAAAABAAAABIAAAAUAAAAFAAAABAAAABIc3R0' +
      'cwAAAAAAAAABAAAABAAAAAEAAAAUc3RzYwAAAAAAAAABAAAABAAAAAEAAAABAAAAHHN0c3oAAAAAAAA' +
      'AMgAAAAEAAAAUAAAAFAAAABRzdGNvAAAAAAAAAAEAAAAwAAAAYXVkdGEAAABZbWV0YQAAAAAAAAAh' +
      'aGRscgAAAAAAAAAABG1kaXJhcHBsAAAAAAAAAAAAAAAALWlsc3QAAAAlqXRvbwAAAB1kYXRhAAAA' +
      'AQAAAABMYXZM';
    document.body.appendChild(_wakeVideo);

    let _wakeLock = null;

    async function _activarWakeLock() {
      if ('wakeLock' in navigator) {
        try {
          if (_wakeLock) return;
          _wakeLock = await navigator.wakeLock.request('screen');
          _wakeLock.addEventListener('release', () => {
            _wakeLock = null;
            if (document.visibilityState === 'visible') _activarWakeLock();
          });
          return;
        } catch (e) {}
      }
      if (_wakeVideo.paused) {
        try { await _wakeVideo.play(); }
        catch (e) { console.warn('[WakeLock] fallback video fallo:', e); }
      }
    }

    ['touchstart', 'touchend', 'click', 'pointerdown'].forEach(ev => {
      document.addEventListener(ev, function _unlock() {
        _activarWakeLock();
        document.removeEventListener(ev, _unlock);
      }, { passive: true });
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        _wakeLock = null;
        _activarWakeLock();
      } else {
        if (!_wakeVideo.paused) _wakeVideo.pause();
      }
    });

    setInterval(() => {
      if (document.visibilityState === 'visible') {
        navigator.serviceWorker?.controller?.postMessage({ tipo: 'heartbeat' });
      }
    }, 4 * 60 * 1000);

  </script>
