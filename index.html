<!DOCTYPE html>
<html lang="es-MX">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Marina 2">
  <meta name="theme-color" content="#0a3d6b">
  <title>Marina 2</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/img/icon-192.png">
  <link rel="icon" type="image/png" href="assets/img/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Outfit:wght@700;800;900&display=swap">

  <style>
    /* ── Variables Marina 2 — Océano Pixar ───────────────────── */
    :root {
      /* Fondos — azul Caribe cálido y luminoso */
      --m-bg: #0a3d6b;
      --m-bg-mid: #0d5a8f;
      --m-surface: rgba(255, 255, 255, 0.13);
      --m-ink: #ffffff;
      --m-ink-soft: rgba(255, 255, 255, 0.68);
      --m-ink-dark: #032340;

      /* Colores vibrantes estilo Pixar */
      --m-primary: #00c2ff;
      /* azul eléctrico */
      --m-primary-dk: #0090cc;
      --m-accent: #ffe566;
      /* amarillo sol */
      --m-teal: #00e5b0;
      /* verde agua tropical */
      --m-coral: #ff6b6b;
      /* coral vivo */
      --m-gold: #ffb800;
      /* naranja pez payaso */

      /* Alias para oceano.js y módulos */
      --t-primary: #00c2ff;
      --t-secondary: #00e5b0;
      --t-accent: #ffe566;
      --t-warn: #ff6b6b;

      /* Layout */
      --r-sm: 12px;
      --r-md: 18px;
      --r-lg: 26px;
      --r-xl: 36px;
      --s-card: 0 8px 24px rgba(0, 30, 80, 0.30);
      --s-deep: 0 16px 48px rgba(0, 20, 60, 0.45);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Nunito', system-ui, sans-serif;
      background: var(--m-bg);
      color: var(--m-ink);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
      touch-action: manipulation;
    }

    /* ── App shell ────────────────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      background: transparent;
    }

    /* ── Header ──────────────────────────────────────────────── */
    #app-header {
      flex-shrink: 0;
      padding-top: calc(14px + var(--safe-top));
      padding-bottom: 12px;
      padding-left: 20px;
      padding-right: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(180deg,
          rgba(5, 30, 65, 0.88) 0%,
          rgba(10, 61, 107, 0.50) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0, 194, 255, 0.18);
      box-shadow: 0 4px 24px rgba(0, 20, 60, 0.30);
      position: relative;
      z-index: 20;
    }

    #header-izq {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .menu-logo {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .menu-logo h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: #fff;
      text-shadow: 0 2px 16px rgba(0, 194, 255, 0.45);
    }

    #saludo-nombre {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: rgba(255, 255, 255, 0.45);
      white-space: nowrap;
    }

    #perfil-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px 5px 8px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.20);
      cursor: default;
      max-width: 150px;
    }

    #perfil-chip-avatar {
      font-size: 1.05rem;
      line-height: 1;
      flex-shrink: 0;
    }

    #perfil-chip-apodo {
      color: rgba(255, 255, 255, 0.85);
      font-size: 0.72rem;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #btn-volver {
      display: none;
      align-items: center;
      justify-content: center;
      width: 42px;
      height: 42px;
      flex-shrink: 0;
      border: none;
      background: rgba(255, 255, 255, 0.14);
      border-radius: 50%;
      padding: 0;
      cursor: pointer;
      transition: transform .12s, background .12s;
    }

    #btn-volver:active {
      transform: scale(.88);
      background: rgba(255, 255, 255, .24);
    }

    #btn-ajustes-header {
      margin-right: 12px;
      width: 34px;
      height: 34px;
      border: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.60);
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: color .15s;
    }

    #btn-ajustes-header:active {
      color: #fff;
    }

    #modulo-acciones {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      justify-content: flex-end;
    }

    #header-derecha {
      display: flex;
      align-items: center;
      flex-shrink: 0;
      margin-left: 6px;
    }

    /* Pill ES / EN */
    #lang-pill {
      display: flex;
      gap: 3px;
      padding: 3px;
      margin-right: 10px;
      border-radius: 99px;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.20);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .lang-btn {
      padding: 5px 14px;
      border-radius: 99px;
      border: none;
      cursor: pointer;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      transition: all .18s;
    }

    .lang-btn.activo {
      background: var(--t-primary);
      color: #032340;
    }

    /* ── Indicador offline ───────────────────────────────────── */
    #indicador-offline {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 800;
      border: 1.5px solid;
      transition: all .3s;
    }

    #indicador-offline.online {
      background: rgba(0, 229, 176, 0.18);
      border-color: #00e5b0;
      color: #00e5b0;
    }

    #indicador-offline.offline {
      background: rgba(255, 107, 107, 0.18);
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    #indicador-offline.checking {
      background: rgba(255, 229, 102, 0.18);
      border-color: #ffe566;
      color: #ffe566;
    }

    #dot-conexion {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .online #dot-conexion {
      background: #00e5b0;
    }

    .offline #dot-conexion {
      background: #ff6b6b;
    }

    .checking #dot-conexion {
      background: #ffe566;
    }

    /* ── Body ────────────────────────────────────────────────── */
    #app-body {
      flex: 1;
      min-height: 0;
      position: relative;
      z-index: 2;
      /* ← sube de 1 a 2 */
      overflow: hidden;
    }

    #vista-menu {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Grid de módulos ─────────────────────────────────────── */
    #menu-grid {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 14px;
      padding: 12px 16px;
      position: relative;
      z-index: 1;
      box-sizing: border-box;
    }

    /* ── Portrait en iPhone — filas libres, sin altura fija ───── */
    @media (max-width: 600px) and (orientation: portrait) {
      #menu-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: auto;
        align-content: start;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        gap: 10px;
        padding: 10px 12px;
        padding-bottom: max(16px, env(safe-area-inset-bottom, 0px));
      }

      .module-tile {
        min-height: 140px;
        max-height: 200px;
        background-size: 100% auto;
        background-position: center top;
        background-repeat: no-repeat;
      }

      .tile-label {
        font-size: .85rem;
      }
    }

    /* ── iPhone SE portrait (≤390px) ─────────────────────────── */
    @media (max-width: 390px) and (orientation: portrait) {
      #app-header {
        padding-top: calc(8px + var(--safe-top));
        padding-bottom: 8px;
        padding-left: 12px;
        padding-right: 10px;
        gap: 6px;
      }

      .menu-logo h1,
      #saludo-nombre {
        font-size: 1.05rem;
      }

      #perfil-chip {
        display: none !important;
      }

      #texto-conexion {
        display: none;
      }

      #indicador-offline {
        padding: 4px 6px;
      }

      .lang-btn {
        padding: 4px 10px;
        font-size: 0.70rem;
      }

      #lang-pill {
        margin-right: 6px;
      }

      #btn-ajustes-header {
        width: 28px;
        height: 28px;
        font-size: 1rem;
        margin-right: 6px;
      }

      #btn-volver {
        width: 34px;
        height: 34px;
      }

      #menu-grid {
        gap: 8px;
        padding: 8px 10px;
        padding-bottom: max(12px, env(safe-area-inset-bottom, 0px));
      }

      .module-tile {
        min-height: 120px;
        max-height: 170px;
      }

      .tile-label {
        font-size: 0.82rem;
      }

      .pin-box {
        padding: 22px 16px;
      }

      .pin-box h3 {
        font-size: 1.05rem;
      }

      #pin-hint {
        font-size: 0.95rem;
        margin-bottom: 12px;
      }

      #input-pin {
        font-size: 2rem;
        padding: 12px;
        margin-bottom: 10px;
      }

      .pin-btns button {
        padding: 12px;
        font-size: 0.95rem;
      }
    }

    .module-tile {
      border-radius: var(--r-xl);
      box-shadow: 0 8px 24px rgba(0, 20, 60, 0.25);
      cursor: pointer;
      transition: transform .15s ease, box-shadow .15s ease;
      min-height: 0;
      /* Imagen como fondo — siempre rellena el botón */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      /* Fallback si no hay imagen */
      background-color: rgba(255, 255, 255, 0.10);
      border: 1.5px solid rgba(255, 255, 255, 0.18);
      /* Label al fondo con gradiente para legibilidad */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 0 0 14px 0;
      overflow: hidden;
      position: relative;
    }

    .module-tile:active {
      transform: scale(.92);
      box-shadow: 0 4px 12px rgba(0, 20, 60, 0.30);
    }

    /* Gradiente oscuro en la parte inferior para leer el label */
    .module-tile::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: linear-gradient(to top,
          rgba(2, 20, 50, 0.75) 0%,
          rgba(2, 20, 50, 0.20) 60%,
          transparent 100%);
      border-radius: 0 0 var(--r-xl) var(--r-xl);
      pointer-events: none;
    }

    .tile-label {
      position: relative;
      z-index: 1;
      font-size: 1.1rem;
      font-weight: 900;
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.70);
      line-height: 1.2;
      padding: 0 10px;
    }

    /* ── Botones nav ─────────────────────────────────────────── */
    .d-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 34px;
      padding: 0 14px;
      border-radius: 99px;
      border: none;
      background: rgba(255, 255, 255, 0.14);
      color: white;
      font-size: .8rem;
      font-weight: 800;
      cursor: pointer;
      gap: 5px;
      white-space: nowrap;
      transition: background .15s, transform .12s;
      font-family: inherit;
    }

    .d-nav-btn:active {
      background: rgba(255, 255, 255, .28);
      transform: scale(.93);
    }

    /* ── Modal PIN ───────────────────────────────────────────── */
    #modal-pin {
      position: fixed;
      inset: 0;
      background: rgba(2, 20, 50, 0.80);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9000;
      backdrop-filter: blur(16px);
    }

    #modal-pin.visible {
      display: flex;
    }

    .pin-box {
      background: rgba(255, 255, 255, 0.14);
      backdrop-filter: blur(20px);
      border: 1.5px solid rgba(255, 255, 255, 0.25);
      border-radius: var(--r-xl);
      padding: 32px;
      width: 88%;
      max-width: 340px;
      text-align: center;
      box-shadow: var(--s-deep);
    }

    .pin-box h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.35rem;
      font-weight: 900;
      margin-bottom: 8px;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 194, 255, 0.40);
    }

    #pin-hint {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: var(--m-accent);
      text-shadow: 0 1px 6px rgba(255, 229, 102, 0.50);
    }

    #input-pin {
      width: 100%;
      padding: 16px;
      text-align: center;
      font-size: 2.8rem;
      font-weight: 900;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: var(--r-md);
      outline: none;
      margin-bottom: 14px;
      background: rgba(255, 255, 255, 0.10);
      color: #fff;
      font-family: inherit;
    }

    #input-pin:focus {
      border-color: var(--t-primary);
      box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.25);
    }

    .pin-btns {
      display: flex;
      gap: 10px;
    }

    .pin-btns button {
      flex: 1;
      padding: 14px;
      border-radius: var(--r-md);
      border: none;
      font-weight: 900;
      font-size: 1.1rem;
      cursor: pointer;
      font-family: inherit;
    }

    #btn-pin-ok {
      background: var(--t-primary);
      color: #032340;
    }

    #btn-pin-cancel {
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.20);
    }

    #pin-error {
      color: var(--m-coral);
      font-size: .95rem;
      font-weight: 800;
      margin-top: 8px;
      min-height: 1em;
      text-shadow: 0 1px 4px rgba(255, 107, 107, 0.40);
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- El fondo animado (tema) se inserta aquí por app.js -->
    <header id="app-header">
      <!-- Montado por app.js -->
    </header>
    <div id="app-body">
      <div id="vista-menu">
        <div id="menu-grid">
          <!-- Módulos montados por app.js -->
        </div>
      </div>
    </div>
  </div>

  <!-- Modal PIN matemático -->
  <div id="modal-pin">
    <div class="pin-box">
      <h3>Área de adultos</h3>
      <div id="pin-hint"></div>
      <input id="input-pin" type="number" inputmode="numeric" autocomplete="off" min="1" max="18" />
      <div class="pin-btns">
        <button id="btn-pin-cancel">Cancelar</button>
        <button id="btn-pin-ok">Abrir</button>
      </div>
      <div id="pin-error"></div>
    </div>
  </div>

  <script>
    setTimeout(() => {
      const info = document.createElement('div');
      info.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:rgba(255,0,0,0.8);color:#fff;font-size:11px;padding:4px;z-index:99999;font-family:monospace;';
      const ids = ['app', 'app-body', 'vista-menu', 'menu-grid'];
      info.innerHTML = ids.map(id => {
        const el = document.getElementById(id);
        if (!el) return `${id}: no encontrado`;
        const b = el.getBoundingClientRect();
        return `${id}: top=${Math.round(b.top)} bot=${Math.round(b.bottom)} h=${Math.round(b.height)}`;
      }).join('<br>') + `<br>win.h=${window.innerHeight}`;
      document.body.appendChild(info);
    }, 2000);
  </script>

  <!-- ══ MÓDULOS — descomentar según se agreguen ══ -->
  <script type="module" src="./app.js"></script>
</body>

</html>
